font_family GeistMono Nerd Font Mono
font_size   13


disable_ligatures yes
enable_audio_bell no

shell zsh
shell_integration disabled

url_style curly

remember_windows_size         no
window_padding_width          30
cursor_blink_interval         0

background_opacity 0.7
scrollbar_handle_opacity      0
scrollbar_track_opacity       0
scrollbar_track_hover_opacity 0
confirm_os_window_close       0


sync_to_monitor  no

# COLORS

foreground #bcc0cc
background #4c4f69
cursor #cccccc
color0 #4c4f69
color1 #d20f39      --red
color2 #40a02b      --green
color3 #df8e1d      --yellow
color4 #7287fd      --blue
color5 #e64553      --darkred
color6 #209fb5      --turqoise
color7 #bcc0cc
color8 #393e48
color9 #e39571      --brown
color10 #209fb5     --turqoise
color11 #df8e1d     --yellow
color12 #7287fd     --blue
color13 #e64553     --darkred
color14 #209fb5     --turqoise
color15 #abb2bf
selection_foreground #4c4f69
selection_background #bcc0cc

