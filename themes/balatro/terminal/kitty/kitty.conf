font_family GeistMono Nerd Font Mono
font_size   13


disable_ligatures yes
enable_audio_bell no

shell zsh
shell_integration disabled

url_style curly

remember_windows_size         no
window_padding_width          30
cursor_blink_interval         0

background_opacity            0.30
scrollbar_handle_opacity      0
scrollbar_track_opacity       0
scrollbar_track_hover_opacity 0
confirm_os_window_close       0


sync_to_monitor  no

# COLORS

foreground #979eab
background #282c34
cursor #cccccc
color0 #282c34
color1 #fd5f55      --red
color2 #83c4b4      --green
color3 #fde487      --yellow
color4 #0094f0      --blue
color5 #d04d61      --darkred
color6 #71d0e4      --turqoise
color7 #979eab
color8 #393e48
color9 #e39571      --brown
color10 #71d0e4     --turqoise
color11 #fde487     --yellow
color12 #0094f0     --blue
color13 #d04d61     --darkred
color14 #71d0e4     --turqoise
color15 #abb2bf
selection_foreground #282c34
selection_background #979eab

